<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chisenon VPM Packages</title>
  <meta name="description" content="Chisenon が公開している VRChat 向け VPM パッケージの一覧。VCC へ追加したり、各バージョンの .zip をダウンロードできます。">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@spiritov/ds.css@2.6.1">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ds-dual">
    <div class="screen-top ds-grid" id="screenTop">
      <div class="bar">
        <span class="bar-title">Chisenon's VPM Packages</span>
        <span class="bar-right">
          <span class="bar-time" id="barTime">--:--</span>
          <span class="bar-date" id="barDate">--- --</span>
          <span class="bar-icon"><a href="https://github.com/Chisenon" target="_blank" rel="noopener noreferrer" aria-label="Chisenon on GitHub" style="display:flex;align-items:center;color:#fff;text-decoration:none"><svg viewBox="0 0 16 16" width="16" height="16"><path fill="#fff" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a></span>
          <span class="bar-icon"><a href="https://x.com/twin_Chisenon" target="_blank" rel="noopener noreferrer" aria-label="twin_Chisenon on X" style="display:flex;align-items:center;color:#fff;text-decoration:none"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="#fff" d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg></a></span>
          <span class="bar-icon bar-icon-vr"><a href="https://vrchat.com/home/user/usr_918ed2ff-51a4-4f89-ba0d-a0f54a50569f" target="_blank" rel="noopener noreferrer" aria-label="VRChat profile" style="display:flex;align-items:center;color:#fff;text-decoration:none">VR</a></span>
        </span>
      </div>
      <div class="top-body">
        <div class="top-info">
          <svg class="analog-clock" viewBox="0 0 100 100" aria-hidden="true">
            <g id="clockMarks"></g>
            <line class="hand hand-hour" id="clockHour" x1="50" y1="50" x2="50" y2="20" />
            <line class="hand hand-min" id="clockMinute" x1="50" y1="50" x2="50" y2="12" />
            <line class="hand hand-sec" id="clockSecond" x1="50" y1="50" x2="50" y2="8" />
            <circle class="clock-cap" cx="50" cy="50" r="2.5" />
          </svg>
        </div>
        <ds-calendar class="top-calendar" style="--color: var(--color-ds-blue)"></ds-calendar>
      </div>
    </div>

    <div class="screen-bottom ds-grid-lg" id="screenBottom">
      <div class="bottom-title-row pictochat-status">
        <span class="bottom-title-text">Chisenon's VPM Packages</span>
      </div>
      <div class="top-bar-row">
        <div class="input-wrapper" style="flex:1;min-width:0">
          <div class="input-before"></div>
          <input type="text" id="vccUrlField" readonly>
          <div class="input-after"></div>
        </div>
        <div class="btn-row" style="flex-shrink:0">
          <button id="vccAddRepoButton" class="button-square ds-blue" title="Add to VCC" aria-label="Add repository to VCC">+</button>
          <button id="vccUrlFieldCopy" class="button-square" title="Copy" aria-label="Copy repository URL">C</button>
        </div>
      </div>

      <div class="pictochat-status ds-slate-50">Packages</div>

      <div class="msg-body">
        <div class="input-wrapper" style="width:100%">
          <div class="input-before"></div>
          <input type="text" id="searchInput" placeholder="Search packages...">
          <div class="input-after"></div>
        </div>
      </div>

      <div class="pkg-scroll" id="packageList"></div>
    </div>
  </div>

  <dialog class="ds-dialog" id="infoDialog">
    <div class="pictochat-message ds-dialog-body">
      <button class="button-square dialog-close-btn" id="dialogClose" title="Close" aria-label="Close">✕</button>
      <div class="dialog-title" id="dialogName"></div>
      <div class="dialog-subtitle" id="dialogSubtitle">
        <span id="dialogId"></span>
        <span id="dialogVersion"></span>
      </div>
      <p id="dialogDescription"></p>

      <div class="pictochat-message">
        <header class="ds-blue-50">Author</header>
        <a id="dialogAuthor" href="#" target="_blank" rel="noopener noreferrer"></a>
      </div>

      <div class="pictochat-message">
        <header class="ds-blue-50">Dependencies</header>
        <ul id="dialogDependencies"></ul>
      </div>

      <div class="pictochat-message">
        <header class="ds-blue-50">Unity Version</header>
        <p id="dialogUnity"></p>
      </div>

      <div class="pictochat-message">
        <header class="ds-blue-50">Download</header>
        <a id="dialogDownloadLink" href="#" target="_blank" rel="noopener noreferrer" class="ds-btn">Download .zip</a>
      </div>
    </div>
  </dialog>

  <script type="module" src="https://unpkg.com/@spiritov/ds.css@2.6.1/dist/widgets/ds-calendar.js"></script>
  <script src="app.js"></script>
</body>
</html>
