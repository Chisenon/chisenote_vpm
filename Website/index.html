<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chisenon VPM Packages</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-content">
        <h1 id="listingName">Loading...</h1>
        <p id="listingDescription" class="description"></p>
        <p class="author-line">Published by <a id="authorLink" href="#" target="_blank"></a></p>
      </div>
    </header>

    <section id="vcc-bar">
      <div class="vcc-input-group">
        <input id="vccUrlField" type="text" readonly>
        <button id="vccCopyBtn" class="btn btn-outline" title="Copy URL">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M8 2C6.89543 2 6 2.89543 6 4V14C6 15.1046 6.89543 16 8 16H14C15.1046 16 16 15.1046 16 14V4C16 2.89543 15.1046 2 14 2H8ZM7 4C7 3.44772 7.44772 3 8 3H14C14.5523 3 15 3.44772 15 4V14C15 14.5523 14.5523 15 14 15H8C7.44772 15 7 14.5523 7 14V4ZM4 6.00001C4 5.25973 4.4022 4.61339 5 4.26758V14.5C5 15.8807 6.11929 17 7.5 17H13.7324C13.3866 17.5978 12.7403 18 12 18H7.5C5.567 18 4 16.433 4 14.5V6.00001Z"/></svg>
          Copy
        </button>
        <button id="vccAddBtn" class="btn btn-primary">Add to VCC</button>
      </div>
    </section>

    <section id="search-section">
      <input id="searchInput" type="text" placeholder="Search packages..." class="search-input">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="avatar">Avatar</button>
        <button class="filter-tab" data-filter="world">World</button>
      </div>
    </section>

    <section id="packages-section">
      <div id="packageGrid" class="package-grid"></div>
      <div id="emptyState" class="empty-state hidden">
        <p>No packages found.</p>
      </div>
    </section>
  </div>

  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3 id="modalName"></h3>
          <div class="modal-subtitle">
            <span id="modalId" class="mono"></span>
            <span id="modalVersion" class="version-badge"></span>
          </div>
        </div>
        <button id="modalClose" class="btn-icon" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M4.08859 4.21569L4.14645 4.14645C4.32001 3.97288 4.58944 3.9536 4.78431 4.08859L4.85355 4.14645L10 9.293L15.1464 4.14645C15.32 3.97288 15.5894 3.9536 15.7843 4.08859L15.8536 4.14645C16.0271 4.32001 16.0464 4.58944 15.9114 4.78431L15.8536 4.85355L10.707 10L15.8536 15.1464C16.0271 15.32 16.0464 15.5894 15.9114 15.7843L15.8536 15.8536C15.68 16.0271 15.4106 16.0464 15.2157 15.9114L15.1464 15.8536L10 10.707L4.85355 15.8536C4.67999 16.0271 4.41056 16.0464 4.21569 15.9114L4.14645 15.8536C3.97288 15.68 3.9536 15.4106 4.08859 15.2157L4.14645 15.1464L9.293 10L4.14645 4.85355C3.97288 4.67999 3.9536 4.41056 4.08859 4.21569L4.14645 4.14645L4.08859 4.21569Z"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <p id="modalDescription" class="modal-description"></p>
        <div class="modal-section">
          <h5>Author</h5>
          <p><a id="modalAuthor" href="#" target="_blank"></a></p>
        </div>
        <div class="modal-section">
          <h5>Dependencies</h5>
          <ul id="modalDependencies" class="dep-list"></ul>
        </div>
        <div class="modal-section">
          <h5>Unity Version</h5>
          <p id="modalUnity"></p>
        </div>
        <div class="modal-section">
          <h5>Download</h5>
          <a id="modalDownloadLink" href="#" target="_blank" class="btn btn-primary btn-sm">Download .zip</a>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
